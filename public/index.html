<!DOCTYPE html>

    .mode-btn:hover { border-color: #8B6914; color: #8B6914; }

    .action-row { display: flex; gap: 8px; width: 100%; }

// ========== 用户系统 ==========
function showAuth() { document.getElementById('authOverlay').style.display = 'flex'; }
function hideAuth() { document.getElementById('authOverlay').style.display = 'none'; }
/* 【修改点3】删除了原来的 switchAuthTab 函数，因为上面没有切换按钮了 */

window.addEventListener('DOMContentLoaded', function() {
  var token = localStorage.getItem('token');
  if (token) {
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(data => {
        if (data.user) showLoggedIn(data.user);
        else { localStorage.clear(); showLoggedOut(); }
      }).catch(() => showLoggedOut());
  } else showLoggedOut();
});

async function handleLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  if (!u || !p) { alert(t('fillAll')); return; }
  var res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
  var data = await res.json();
  if (data.token) { localStorage.setItem('token', data.token); showLoggedIn(data.user); hideAuth(); }
  else alert(data.error || t('loginFailed'));
}

async function handleRegister() {
  var u = document.getElementById('reg-username').value.trim();
  var e = document.getElementById('reg-email').value.trim();
  var p = document.getElementById('reg-password').value;
  var c = document.getElementById('reg-confirm').value;
  if (!u || !e || !p) { alert(t('fillAllFields')); return; }
  if (p !== c) { alert(t('passwordMismatch')); return; }
  var res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, email: e, password: p }) });
  var data = await res.json();
  if (data.token) { localStorage.setItem('token', data.token); showLoggedIn(data.user); hideAuth(); }
  else alert(data.error || t('registerFailed'));
}

function handleLogout() { localStorage.clear(); showLoggedOut(); }

function showLoggedIn(user) {
  document.getElementById('navRight').style.display = 'none';
  document.getElementById('navRightLogged').style.display = 'flex';
  document.getElementById('navUserName').textContent = user.username + ' (' + (user.rating || 1000) + ')';
}

function showLoggedOut() {
  document.getElementById('navRight').style.display = 'flex';
  document.getElementById('navRightLogged').style.display = 'none';
}

<script>
window.addEventListener('DOMContentLoaded', function() {
  let socket = null;

    socket = io({ transports: ['polling', 'websocket'], reconnection: true, reconnectionAttempts: 10, reconnectionDelay: 1000 });
  }

  const BOARD_SIZE = 15, EMPTY = 0, BLACK = 1, WHITE = 2;
  const BLACK_STR = 'black', WHITE_STR = 'white';
  const CELL_SIZE = 35, PADDING = 24;
  const CANVAS_SIZE = CELL_SIZE * (BOARD_SIZE - 1) + PADDING * 2;
  const MODE_PVP = 'pvp', MODE_AI = 'ai', MODE_ONLINE = 'online';

  let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
  let currentPlayer = BLACK, winner = null, winningCells = [], historyStack = [], moveCount = 0, isDraw = false;

  let isMyTurn = true, isAiThinking = false;
  const INITIAL_TIME = 600;
  let blackTime = INITIAL_TIME, whiteTime = INITIAL_TIME, timerInterval = null, timerActive = false;
  let hoverRow = -1, hoverCol = -1, animatingStone = null;
  const ANIM_DURATION = 200;
  let canvas, ctx, turnTextEl, moveCountEl, mainClockEl;

  function formatTime(s) { const m = Math.floor(Math.max(0,s)/60), sec = Math.floor(Math.max(0,s)%60); return m.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0'); }
  function showNotification(msg, dur=3000) { const n = document.createElement('div'); n.className='notification'; n.textContent=msg; document.body.appendChild(n); setTimeout(()=>{if(n.parentNode)n.remove();}, dur); }
  function showModal(title, message, buttons=[]) {
    const m = document.createElement('div'); m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999;';
    let bHTML = buttons.map(b=>`<button id="${b.id||''}" style="margin:4px;padding:8px 16px;border-radius:6px;border:1px solid #8B6914;background:#fff;color:#8B6914;cursor:pointer;font-weight:bold;">${b.text}</button>`).join('');
    m.innerHTML=`<div style="background:#fff;border-radius:12px;padding:24px;text-align:center;max-width:360px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.2);"><h3>${title}</h3><p style="color:#888;margin-bottom:12px;">${message}</p>${bHTML}</div>`;
    document.body.appendChild(m); buttons.forEach(b=>{if(b.id&&b.onClick){const el=document.getElementById(b.id);if(el)el.addEventListener('click',()=>{b.onClick();m.remove();});}});
    return m;
  }

  function checkWin(row, col, player) {
    if(board[row][col]!==player) return null;
    const dirs=[[1,0],[0,1],[1,1],[1,-1]];
    for(let[dx,dy]of dirs){let cells=[[row,col]];for(let s=1;s<5;s++){const r=row+dx*s,c=col+dy*s;if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player)cells.push([r,c]);else break;}for(let s=1;s<5;s++){const r=row-dx*s,c=col-dy*s;if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player)cells.unshift([r,c]);else break;}if(cells.length>=5)return cells;}
    return null;
  }

  function isBoardFull(){for(let r=0;r<BOARD_SIZE;r++)for(let c=0;c<BOARD_SIZE;c++)if(board[r][c]===EMPTY)return false;return true;}
  function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}timerActive=false;}
  function startTimerIfNeeded(){
    if(timerActive||winner||isDraw||gameMode===MODE_ONLINE||(gameMode===MODE_AI&&currentPlayer===aiColor))return;
    timerActive=true;timerInterval=setInterval(()=>{if(winner||isDraw){stopTimer();return;}if(currentPlayer===BLACK){blackTime--;if(blackTime<=0){blackTime=0;winner=WHITE;stopTimer();updateUI();drawBoard();}}else{whiteTime--;if(whiteTime<=0){whiteTime=0;winner=BLACK;stopTimer();updateUI();drawBoard();}}updateClockDisplay();},1000);
  }

  function updateClockDisplay(){if(!mainClockEl)return;const t=currentPlayer===BLACK?blackTime:whiteTime;mainClockEl.textContent=formatTime(t);mainClockEl.style.color=(currentPlayer===BLACK?blackTime:whiteTime)<=30?'#e53e3e':'#8B6914';}

  if(socket){
    socket.on('connect',()=>console.log('connected'));
    socket.on('privateRoomCreated',({roomId})=>{currentRoomId=roomId;gameMode=MODE_ONLINE;updateModeButtons();navigator.clipboard.writeText(`${window.location.origin}/room/${roomId}`).then(()=>showNotification(t('inviteCopied'))).catch(()=>showNotification(t('roomNumber')+roomId));document.getElementById('roomInfo').style.display='block';document.getElementById('roomIdDisplay').textContent=roomId;});
    socket.on('joinedRoom',({roomId,color})=>{currentRoomId=roomId;myColor=color===BLACK_STR?BLACK:WHITE;gameMode=MODE_ONLINE;updateModeButtons();showNotification(t('joined')+(color===BLACK_STR?'⚫黑':'⚪白'));document.getElementById('roomInfo').style.display='block';document.getElementById('roomIdDisplay').textContent=roomId;updateUI();});
    socket.on('gameState',(gameState)=>{
      const prevWinner=winner;
      board=gameState.board.map(row=>row.map(cell=>cell===BLACK_STR?BLACK:cell===WHITE_STR?WHITE:EMPTY));
      currentPlayer=gameState.currentPlayer===BLACK_STR?BLACK:WHITE;
      winner=gameState.winner?(gameState.winner===BLACK_STR?BLACK:WHITE):null;
      winningCells=gameState.winningCells||[];moveCount=gameState.moveCount;isDraw=gameState.isDraw;
      if(gameState.timers){blackTime=gameState.timers.black;whiteTime=gameState.timers.white;}
      isMyTurn=(currentPlayer===myColor);updateUI();drawBoard();
      if(myColor&&(winner||isDraw)&&!prevWinner&&!gameState._statsUpdated){
        gameState._statsUpdated=true;const token=localStorage.getItem('token');
        if(token){let result=winner===myColor?'win':(winner&&winner!==myColor?'loss':'draw');
        if(result)fetch('/api/update-stats',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({result})}).then(r=>r.json()).then(data=>{if(data.stats)document.getElementById('navUserName').textContent=(data.stats.username||'')+'('+data.stats.rating+')';});}
      }
    });
    socket.on('undoRequest',()=>showModal(t('undoRequest'),t('undoRequestMsg'),[{text:t('accept'),id:'aUndo',onClick:()=>socket.emit('acceptUndo',{roomId:currentRoomId})},{text:t('reject'),id:'rUndo',onClick:()=>socket.emit('rejectUndo',{roomId:currentRoomId})}]));
    socket.on('undoRejected',()=>showNotification(t('undoRejected')));
    socket.on('playerDisconnected',({message})=>{showNotification('⚠️ '+message);if(myColor){winner=myColor;updateUI();drawBoard();}});
    socket.on('error',({message})=>showNotification('⚠️ '+message));
  }

  // AI (unchanged)
  function getNearbyEmptyCells(radius=2){const set=new Set();for(let r=0;r<BOARD_SIZE;r++)for(let c=0;c<BOARD_SIZE;c++)if(board[r][c]!==EMPTY)for(let dr=-radius;dr<=radius;dr++)for(let dc=-radius;dc<=radius;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<BOARD_SIZE&&nc>=0&&nc<BOARD_SIZE&&board[nr][nc]===EMPTY)set.add(`${nr},${nc}`);}return set.size?Array.from(set).map(s=>s.split(',').map(Number)):[[7,7]];}
  function evaluatePosition(row,col,player){let score=0;board[row][col]=player;const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(let[dx,dy]of dirs){let count=1,openEnds=0,r=row+dx,c=col+dy;while(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player){count++;r+=dx;c+=dy;}if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY)openEnds++;r=row-dx;c=col-dy;while(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player){count++;r-=dx;c-=dy;}if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY)openEnds++;if(count>=5)score+=100000;else if(count===4)score+=openEnds===2?10000:openEnds===1?3000:0;else if(count===3)score+=openEnds===2?2000:openEnds===1?800:0;else if(count===2)score+=openEnds===2?400:openEnds===1?100:0;else if(count===1)score+=10;}board[row][col]=EMPTY;return score;}
  function evaluateDefense(row,col,player){const opp=player===BLACK?WHITE:BLACK;let score=0;board[row][col]=opp;const dirs=[[1,0],[0,1],[1,1],[1,-1]];for(let[dx,dy]of dirs){let count=1,openEnds=0,r=row+dx,c=col+dy;while(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===opp){count++;r+=dx;c+=dy;}if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY)openEnds++;r=row-dx;c=col-dy;while(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===opp){count++;r-=dx;c-=dy;}if(r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY)openEnds++;if(count>=5)score+=80000;else if(count===4&&openEnds>=1)score+=8000;else if(count===3&&openEnds===2)score+=1500;}board[row][col]=EMPTY;return score;}
  function aiMove(){if(winner||isDraw){isAiThinking=false;updateUI();return;}const candidates=getNearbyEmptyCells(2);let bestScore=-Infinity,bestMoves=[];for(let[r,c]of candidates){let score=evaluatePosition(r,c,aiColor)*1.2+evaluateDefense(r,c,aiColor)*1.1+evaluatePosition(r,c,aiColor===BLACK?WHITE:BLACK)*0.3+(14-Math.abs(r-7)-Math.abs(c-7))*5;if(score>bestScore){bestScore=score;bestMoves=[[r,c]];}else if(score===bestScore)bestMoves.push([r,c]);}isAiThinking=false;if(bestMoves.length)placeStoneLocal(bestMoves[0][0],bestMoves[0][1]);}

  function resetGame(){if(gameMode===MODE_ONLINE&&currentRoomId&&socket){socket.emit('leaveRoom',{roomId:currentRoomId});currentRoomId=null;myColor=null;}stopTimer();board=Array(BOARD_SIZE).fill().map(()=>Array(BOARD_SIZE).fill(EMPTY));currentPlayer=BLACK;winner=null;winningCells=[];historyStack=[];moveCount=0;isDraw=false;blackTime=INITIAL_TIME;whiteTime=INITIAL_TIME;timerActive=false;hoverRow=-1;hoverCol=-1;isMyTurn=true;isAiThinking=false;animatingStone=null;document.getElementById('roomInfo').style.display='none';updateModeButtons();updateUI();drawBoard();if(gameMode===MODE_AI&&aiColor===BLACK)setTimeout(()=>aiMove(),300);}
  function undoMove(){if(isAiThinking)return;if(gameMode===MODE_ONLINE&&currentRoomId&&socket){socket.emit('requestUndo',{roomId:currentRoomId});showNotification(t('undoSent'));}else if(gameMode===MODE_AI&&historyStack.length>=2&&!winner&&!isDraw){for(let i=0;i<2;i++){const last=historyStack.pop();board=last.board.map(r=>[...r]);currentPlayer=last.player;moveCount=last.moveCount;}updateUI();drawBoard();}else if(gameMode===MODE_PVP&&historyStack.length>0&&!winner&&!isDraw){const last=historyStack.pop();board=last.board.map(r=>[...r]);currentPlayer=last.player;moveCount=last.moveCount;updateUI();drawBoard();}}
  function placeStoneLocal(row,col){if(board[row][col]!==EMPTY||winner||isDraw)return;historyStack.push({board:board.map(r=>[...r]),player:currentPlayer,moveCount});board[row][col]=currentPlayer;moveCount++;animatingStone={row,col,startTime:performance.now()};const winResult=checkWin(row,col,currentPlayer);if(winResult){winner=currentPlayer;winningCells=winResult;stopTimer();updateUI();drawBoard();return;}if(isBoardFull()){isDraw=true;stopTimer();updateUI();drawBoard();return;}currentPlayer=currentPlayer===BLACK?WHITE:BLACK;startTimerIfNeeded();updateUI();drawBoard();if(gameMode===MODE_AI&&currentPlayer===aiColor&&!winner&&!isDraw)setTimeout(()=>aiMove(),50);}
  function placeStone(row,col){if(gameMode===MODE_ONLINE){if(!isMyTurn||winner||isDraw||!currentRoomId||!socket)return;socket.emit('makeMove',{roomId:currentRoomId,row,col});}else placeStoneLocal(row,col);}
  function createPrivateRoom(){if(!socket)return showNotification(t('notConnected'));socket.emit('createPrivateRoom');}
  function joinMatchmaking(){if(!socket)return showNotification(t('notConnected'));socket.emit('joinMatchmaking',{color:playerColor===BLACK?BLACK_STR:WHITE_STR});}

  function updateUI(){
    if(!turnTextEl)return;let txt;
    if(winner){txt=winner===BLACK?t('blackWins'):t('whiteWins');turnTextEl.style.color='#8B6914';}
    else if(isDraw){txt=t('draw');turnTextEl.style.color='#888';}
    else{txt=(currentPlayer===BLACK?t('black'):t('white'))+' '+(gameMode===MODE_ONLINE?(isMyTurn?t('yourTurn'):t('opponentTurn')):'');turnTextEl.style.color='#333';}
    turnTextEl.textContent=txt;
    if(moveCountEl)moveCountEl.textContent=t('moves')+' '+moveCount;
    updateClockDisplay();
    document.getElementById('blackName').textContent=gameMode===MODE_ONLINE?(myColor===BLACK?t('youBlack'):t('opponentBlack')):t('black');
    document.getElementById('whiteName').textContent=gameMode===MODE_ONLINE?(myColor===WHITE?t('youWhite'):t('opponentWhite')):t('white');
    document.getElementById('blackInfo').textContent=currentPlayer===BLACK&&!winner&&!isDraw?t('thinking'):'';
    document.getElementById('whiteInfo').textContent=currentPlayer===WHITE&&!winner&&!isDraw?t('thinking'):'';
  }

  function updateModeButtons(){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===gameMode));document.getElementById('onlineControls').style.display=gameMode===MODE_ONLINE?'flex':'none';document.getElementById('aiSettings').style.display=gameMode===MODE_AI?'flex':'none';}

  function drawBoard(){
    if(!ctx)return;ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
    ctx.fillStyle='#e8d5a3';ctx.beginPath();ctx.roundRect(0,0,CANVAS_SIZE,CANVAS_SIZE,14);ctx.fill();
    ctx.strokeStyle='#5a4a2a';ctx.lineWidth=1;
    for(let i=0;i<BOARD_SIZE;i++){const pos=PADDING+i*CELL_SIZE;ctx.beginPath();ctx.moveTo(PADDING,pos);ctx.lineTo(PADDING+(BOARD_SIZE-1)*CELL_SIZE,pos);ctx.stroke();ctx.beginPath();ctx.moveTo(pos,PADDING);ctx.lineTo(pos,PADDING+(BOARD_SIZE-1)*CELL_SIZE);ctx.stroke();}
    const starPoints=[[3,3],[3,11],[7,7],[11,3],[11,11]];
    for(let[r,c]of starPoints){const x=PADDING+c*CELL_SIZE,y=PADDING+r*CELL_SIZE;ctx.fillStyle='#5a4a2a';ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();}
    let lastMoveRow=-1,lastMoveCol=-1;
    if(historyStack.length>0){const pb=historyStack[historyStack.length-1].board;for(let r=0;r<BOARD_SIZE;r++)for(let c=0;c<BOARD_SIZE;c++)if(board[r][c]!==EMPTY&&pb[r][c]===EMPTY){lastMoveRow=r;lastMoveCol=c;}}
    for(let r=0;r<BOARD_SIZE;r++){for(let c=0;c<BOARD_SIZE;c++){const stone=board[r][c];if(stone===EMPTY)continue;const x=PADDING+c*CELL_SIZE,y=PADDING+r*CELL_SIZE,radius=CELL_SIZE*0.43;const isWinStone=winningCells?.some(([wr,wc])=>wr===r&&wc===c);const isLastMove=(r===lastMoveRow&&c===lastMoveCol);let scale=1;if(animatingStone?.row===r&&animatingStone?.col===c){const elapsed=performance.now()-animatingStone.startTime;if(elapsed<ANIM_DURATION){const t=elapsed/ANIM_DURATION,c1=1.70158,c3=c1+1;scale=Math.max(0,Math.min(1,1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)));requestAnimationFrame(drawBoard);}else animatingStone=null;}const dr=radius*scale;ctx.save();ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=4;ctx.shadowOffsetX=1;ctx.shadowOffsetY=2;const g=ctx.createRadialGradient(x-dr*0.25,y-dr*0.3,dr*0.05,x,y,dr);if(stone===BLACK){g.addColorStop(0,'#555');g.addColorStop(0.5,'#1a1a1a');g.addColorStop(1,'#000');}else{g.addColorStop(0,'#fff');g.addColorStop(0.4,'#f0f0f0');g.addColorStop(1,'#ccc');}ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,dr,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.fillStyle=stone===BLACK?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(x-dr*0.3,y-dr*0.35,dr*0.2,0,Math.PI*2);ctx.fill();ctx.restore();if(isWinStone){ctx.save();ctx.shadowColor='#fbbf24';ctx.shadowBlur=12;ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,dr+2,0,Math.PI*2);ctx.stroke();ctx.restore();}if(isLastMove&&!winner&&!isDraw){ctx.save();ctx.fillStyle='#ef4444';ctx.shadowColor='#ef4444';ctx.shadowBlur=4;ctx.beginPath();ctx.arc(x,y,dr*0.18,0,Math.PI*2);ctx.fill();ctx.restore();}}}
    const canPlace=gameMode!==MODE_ONLINE||isMyTurn;if(!winner&&!isDraw&&!isAiThinking&&canPlace&&hoverRow>=0&&hoverCol>=0&&board[hoverRow][hoverCol]===EMPTY){const x=PADDING+hoverCol*CELL_SIZE,y=PADDING+hoverRow*CELL_SIZE,r=CELL_SIZE*0.43;ctx.globalAlpha=0.35;ctx.fillStyle=currentPlayer===BLACK?'#333':'#ddd';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  }

  function getBoardRowCol(cx,cy){const rect=canvas.getBoundingClientRect(),sx=CANVAS_SIZE/rect.width,sy=CANVAS_SIZE/rect.height;const canX=(cx-rect.left)*sx,canY=(cy-rect.top)*sy;const col=Math.round((canX-PADDING)/CELL_SIZE),row=Math.round((canY-PADDING)/CELL_SIZE);return(row>=0&&row<BOARD_SIZE&&col>=0&&col<BOARD_SIZE)?{row,col}:null;}
  function setupEvents(){if(!canvas)return;canvas.addEventListener('click',(e)=>{if(isAiThinking)return;if(gameMode===MODE_ONLINE&&!isMyTurn)return;if(gameMode===MODE_AI&&currentPlayer!==playerColor)return;const pos=getBoardRowCol(e.clientX,e.clientY);if(pos)placeStone(pos.row,pos.col);});canvas.addEventListener('mousemove',(e)=>{const pos=getBoardRowCol(e.clientX,e.clientY);const can=gameMode===MODE_PVP||(gameMode===MODE_AI&&currentPlayer===playerColor&&!isAiThinking)||(gameMode===MODE_ONLINE&&isMyTurn);if(pos&&board[pos.row][pos.col]===EMPTY&&!winner&&!isDraw&&can){if(hoverRow!==pos.row||hoverCol!==pos.col){hoverRow=pos.row;hoverCol=pos.col;drawBoard();}}else{if(hoverRow!==-1||hoverCol!==-1){hoverRow=-1;hoverCol=-1;drawBoard();}}});canvas.addEventListener('mouseleave',()=>{if(hoverRow!==-1||hoverCol!==-1){hoverRow=-1;hoverCol=-1;drawBoard();}});}
  function switchMode(mode){if(mode===gameMode)return;if(gameMode===MODE_ONLINE&&currentRoomId&&socket)socket.emit('leaveRoom',{roomId:currentRoomId});stopTimer();currentRoomId=null;myColor=null;isMyTurn=true;gameMode=mode;isAiThinking=false;playerColor=BLACK;aiColor=WHITE;board=Array(BOARD_SIZE).fill().map(()=>Array(BOARD_SIZE).fill(EMPTY));currentPlayer=BLACK;winner=null;winningCells=[];historyStack=[];moveCount=0;isDraw=false;blackTime=INITIAL_TIME;whiteTime=INITIAL_TIME;timerActive=false;hoverRow=-1;hoverCol=-1;animatingStone=null;document.getElementById('roomInfo').style.display='none';document.querySelectorAll('.color-dot').forEach(o=>o.classList.toggle('sel',parseInt(o.dataset.color)===BLACK));updateModeButtons();updateUI();drawBoard();if(gameMode===MODE_AI&&aiColor===BLACK)setTimeout(()=>aiMove(),300);}
  function setPlayerColor(color){if(color===playerColor||isAiThinking)return;playerColor=color;aiColor=color===BLACK?WHITE:BLACK;document.querySelectorAll('.color-dot').forEach(o=>o.classList.toggle('sel',parseInt(o.dataset.color)===color));board=Array(BOARD_SIZE).fill().map(()=>Array(BOARD_SIZE).fill(EMPTY));currentPlayer=BLACK;winner=null;winningCells=[];historyStack=[];moveCount=0;isDraw=false;blackTime=INITIAL_TIME;whiteTime=INITIAL_TIME;stopTimer();hoverRow=-1;hoverCol=-1;isAiThinking=false;animatingStone=null;updateUI();drawBoard();if(aiColor===BLACK)setTimeout(()=>aiMove(),300);}

  // init
  canvas=document.getElementById('boardCanvas');canvas.width=CANVAS_SIZE;canvas.height=CANVAS_SIZE;ctx=canvas.getContext('2d');
  turnTextEl=document.getElementById('turnText');moveCountEl=document.getElementById('moveCount');mainClockEl=document.getElementById('mainClock');
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(w<2*r)r=w/2;if(h<2*r)r=h/2;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;};
  document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>switchMode(b.dataset.mode)));
  document.querySelectorAll('.color-dot').forEach(o=>o.addEventListener('click',()=>setPlayerColor(parseInt(o.dataset.color))));
  document.getElementById('createRoomBtn').addEventListener('click',createPrivateRoom);
  document.getElementById('matchmakingBtn').addEventListener('click',()=>{joinMatchmaking();document.getElementById('matchmakingBtn').style.display='none';});
  document.getElementById('resetBtn').addEventListener('click',resetGame);
  document.getElementById('undoBtn').addEventListener('click',undoMove);
  const pathRoomId=window.location.pathname.split('/room/')[1];
  if(pathRoomId&&socket){gameMode=MODE_ONLINE;updateModeButtons();socket.emit('joinPrivateRoom',{roomId:pathRoomId});}
  setupEvents();updateUI();drawBoard();console.log('🎮 Gomoku ready');
});
</script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>暗黑五子棋 · 科技棋院</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0e17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* ===== 主容器 ===== */
    .main-container {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ===== 顶部信息栏 ===== */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    /* 玩家信息卡片 */
    .player-card {
      background: #1a1f2e;
      border: 1px solid #2a3040;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .player-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .player-avatar.black-av {
      background: radial-gradient(circle at 35% 35%, #555, #111);
      border: 2px solid #444;
    }
    .player-avatar.white-av {
      background: radial-gradient(circle at 35% 35%, #fff, #ccc);
      border: 2px solid #999;
    }

    .player-info {
      min-width: 0;
    }
    .player-name {
      font-size: 0.85rem;
      color: #e2e8f0;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-rating {
      font-size: 0.7rem;
      color: #64748b;
    }

    /* 中间计时器 */
    .timer-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 70px;
    }
    .timer-center .vs-text {
      font-size: 0.65rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .timer-center .clock {
      font-family: 'Fira Code', monospace;
      font-size: 0.95rem;
      color: #38bdf8;
      font-weight: 600;
    }

    /* ===== 模式切换 ===== */
    .mode-row {
      display: flex;
      gap: 4px;
      width: 100%;
    }
    .mode-btn {
      flex: 1;
      padding: 7px 0;
      border-radius: 6px;
      border: 1px solid #2a3040;
      background: #1a1f2e;
      color: #64748b;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.15s;
    }
    .mode-btn:hover { color: #94a3b8; border-color: #475569; }
    .mode-btn.active {
      background: #38bdf8;
      color: #0a0e17;
      border-color: #38bdf8;
    }

    /* 在线控制 */
    .online-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    .online-row button {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      border: 1px solid #38bdf8;
      background: transparent;
      color: #38bdf8;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .online-row button:hover { background: #38bdf8; color: #0a0e17; }

    .room-id-text {
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
    }
    .room-id-text span { color: #38bdf8; font-family: 'Fira Code', monospace; }

    /* ===== 状态栏 ===== */
    .status-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }
    .turn-text {
      color: #e2e8f0;
      font-weight: 600;
    }
    .move-text {
      color: #64748b;
    }

    /* ===== 棋盘 ===== */
    .board-wrap {
      position: relative;
    }
    canvas {
      display: block;
      border-radius: 12px;
      cursor: pointer;
      max-width: 100%;
    }

    /* ===== 操作按钮 ===== */
    .action-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      border: 1px solid #2a3040;
      background: #1a1f2e;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.15s;
    }
    .btn:hover { background: #252d3a; color: #e2e8f0; }

    /* ===== 登录框 ===== */
    .auth-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .auth-card {
      background: #1a1f2e;
      border: 1px solid #2a3040;
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 340px;
      color: #e2e8f0;
    }
    .auth-card h3 { color: #38bdf8; margin-bottom: 12px; font-size: 0.95rem; }
    .auth-card input {
      width: 100%; padding: 8px; margin: 4px 0;
      border-radius: 6px; border: 1px solid #2a3040;
      background: #0f131c; color: #e2e8f0; font-size: 0.8rem;
    }
    .auth-card button {
      width: 100%; padding: 8px; margin-top: 8px;
      background: #38bdf8; color: #0a0e17;
      border: none; border-radius: 6px; cursor: pointer;
      font-weight: bold; font-size: 0.85rem;
    }
    .auth-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .auth-tab {
      flex: 1; padding: 6px; background: #0f131c; border: 1px solid #2a3040;
      border-radius: 6px; color: #64748b; cursor: pointer; font-size: 0.75rem; text-align: center;
    }
    .auth-tab.active { background: #38bdf8; color: #0a0e17; border-color: #38bdf8; }

    /* 用户条 */
    .user-strip {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1f2e;
      border: 1px solid #2a3040;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.75rem;
    }
    .user-strip .usr-name { color: #e2e8f0; font-weight: 600; }
    .user-strip .usr-rating { color: #fbbf24; }
    .user-strip .usr-stats { color: #64748b; }
    .user-strip button {
      padding: 4px 10px; border-radius: 5px; border: 1px solid #475569;
      background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.7rem;
    }

    /* 通知 */
    .notification {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: #1a1f2e; border: 1px solid #38bdf8; padding: 8px 18px;
      border-radius: 8px; color: #e2e8f0; z-index: 1000; font-size: 0.8rem;
    }

    /* 颜色选择 */
    .color-pick-row {
      display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: #64748b;
    }
    .color-dot {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    }
    .color-dot.black-dot { background: radial-gradient(circle at 35% 35%, #555, #111); }
    .color-dot.white-dot { background: radial-gradient(circle at 35% 35%, #fff, #ccc); }
    .color-dot.sel { border-color: #38bdf8; }
  </style>
</head>
<body>

<div class="main-container">

  <!-- ===== 顶部：玩家信息 ===== -->
  <div class="top-bar">
    <div class="player-card">
      <div class="player-avatar black-av"></div>
      <div class="player-info">
        <div class="player-name" id="blackName">⚫ 黑方</div>
        <div class="player-rating" id="blackInfo">先手</div>
      </div>
    </div>
    <div class="timer-center">
      <div class="vs-text">VS</div>
      <div class="clock" id="mainClock">10:00</div>
    </div>
    <div class="player-card">
      <div class="player-avatar white-av"></div>
      <div class="player-info">
        <div class="player-name" id="whiteName">⚪ 白方</div>
        <div class="player-rating" id="whiteInfo">后手</div>
      </div>
    </div>
  </div>

  <!-- ===== 用户状态条 ===== -->
  <div class="user-strip" id="userStrip">
    <span style="color:#64748b;">未登录</span>
    <button onclick="showAuth()">登录 / 注册</button>
  </div>
  <div class="user-strip" id="userStripLogged" style="display:none;">
    <span class="usr-name" id="usrName"></span>
    <span class="usr-rating" id="usrRating">1000</span>
    <span class="usr-stats"><span id="usrW">0</span>胜/<span id="usrL">0</span>负/<span id="usrD">0</span>平</span>
    <button onclick="handleLogout()">退出</button>
  </div>

  <!-- ===== 模式切换 ===== -->
  <div class="mode-row">
    <button class="mode-btn active" data-mode="pvp">👥 本地双人</button>
    <button class="mode-btn" data-mode="ai">🤖 AI对战</button>
    <button class="mode-btn" data-mode="online">🌐 在线联机</button>
  </div>

  <!-- 在线控制 -->
  <div class="online-row" id="onlineControls" style="display:none;">
    <button id="createRoomBtn">🏠 创建房间</button>
    <button id="matchmakingBtn">🎯 快速匹配</button>
  </div>

  <!-- AI设置 -->
  <div class="color-pick-row" id="aiSettings" style="display:none; justify-content:center;">
    选择棋子：
    <div class="color-dot black-dot sel" data-color="1"></div>
    <div class="color-dot white-dot" data-color="2"></div>
  </div>

  <!-- 房间号 -->
  <div class="room-id-text" id="roomInfo" style="display:none;">
    房间号：<span id="roomIdDisplay">------</span>（点击复制）
  </div>

  <!-- ===== 状态行 ===== -->
  <div class="status-row">
    <span class="turn-text" id="turnText">⚫ 黑方回合</span>
    <span class="move-text" id="moveCount">步数 0</span>
  </div>

  <!-- ===== 棋盘 ===== -->
  <div class="board-wrap">
    <canvas id="boardCanvas"></canvas>
  </div>

  <!-- ===== 操作按钮 ===== -->
  <div class="action-row">
    <button class="btn" id="resetBtn">↺ 新的一局</button>
    <button class="btn" id="undoBtn">↩ 悔棋</button>
  </div>

</div>

<!-- ===== 登录弹窗 ===== -->
<div class="auth-overlay" id="authOverlay" style="display:none;">
  <div class="auth-card">
    <div id="auth-forms">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
      </div>
      <div id="login-form">
        <h3>登录</h3>
        <input type="text" id="login-username" placeholder="用户名或邮箱">
        <input type="password" id="login-password" placeholder="密码">
        <button onclick="handleLogin()">登录</button>
      </div>
      <div id="register-form" style="display:none;">
        <h3>注册</h3>
        <input type="text" id="reg-username" placeholder="用户名">
        <input type="email" id="reg-email" placeholder="邮箱">
        <input type="password" id="reg-password" placeholder="密码">
        <input type="password" id="reg-confirm" placeholder="确认密码">
        <button onclick="handleRegister()">注册</button>
      </div>
    </div>
    <button style="background:#2a3040;color:#94a3b8;margin-top:8px;" onclick="hideAuth()">关闭</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ========== 用户系统 ==========
function showAuth() { document.getElementById('authOverlay').style.display = 'flex'; }
function hideAuth() { document.getElementById('authOverlay').style.display = 'none'; }

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  if (tab === 'login') {
    document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
  } else {
    document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  }
}

window.addEventListener('DOMContentLoaded', function() {
  var token = localStorage.getItem('token');
  if (token) {
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(data => {
        if (data.user) showLoggedIn(data.user);
        else { localStorage.clear(); showLoggedOut(); }
      }).catch(() => showLoggedOut());
  } else showLoggedOut();
});

async function handleLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  if (!u || !p) { alert('请填写完整'); return; }
  var res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
  var data = await res.json();
  if (data.token) { localStorage.setItem('token', data.token); showLoggedIn(data.user); hideAuth(); }
  else alert(data.error);
}

async function handleRegister() {
  var u = document.getElementById('reg-username').value.trim();
  var e = document.getElementById('reg-email').value.trim();
  var p = document.getElementById('reg-password').value;
  var c = document.getElementById('reg-confirm').value;
  if (!u || !e || !p) { alert('请填写所有字段'); return; }
  if (p !== c) { alert('两次密码不一致'); return; }
  var res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, email: e, password: p }) });
  var data = await res.json();
  if (data.token) { localStorage.setItem('token', data.token); showLoggedIn(data.user); hideAuth(); }
  else alert(data.error);
}

function handleLogout() { localStorage.clear(); showLoggedOut(); }

function showLoggedIn(user) {
  document.getElementById('userStrip').style.display = 'none';
  document.getElementById('userStripLogged').style.display = 'flex';
  document.getElementById('usrName').textContent = user.username;
  document.getElementById('usrRating').textContent = user.rating || 1000;
  document.getElementById('usrW').textContent = user.wins || 0;
  document.getElementById('usrL').textContent = user.losses || 0;
  document.getElementById('usrD').textContent = user.draws || 0;
}

function showLoggedOut() {
  document.getElementById('userStrip').style.display = 'flex';
  document.getElementById('userStripLogged').style.display = 'none';
}
</script>

<script>
window.addEventListener('DOMContentLoaded', function() {
  let socket = null;
  if (typeof io !== 'undefined') {
    socket = io({ transports: ['polling', 'websocket'], reconnection: true, reconnectionAttempts: 10, reconnectionDelay: 1000 });
  }

  const BOARD_SIZE = 15, EMPTY = 0, BLACK = 1, WHITE = 2;
  const BLACK_STR = 'black', WHITE_STR = 'white';
  const CELL_SIZE = 35, PADDING = 24;
  const CANVAS_SIZE = CELL_SIZE * (BOARD_SIZE - 1) + PADDING * 2;
  const MODE_PVP = 'pvp', MODE_AI = 'ai', MODE_ONLINE = 'online';

  let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
  let currentPlayer = BLACK, winner = null, winningCells = [], historyStack = [], moveCount = 0, isDraw = false;
  let gameMode = MODE_PVP, playerColor = BLACK, aiColor = WHITE, myColor = null, currentRoomId = null;
  let isMyTurn = true, isAiThinking = false;
  const INITIAL_TIME = 600;
  let blackTime = INITIAL_TIME, whiteTime = INITIAL_TIME, timerInterval = null, timerActive = false;
  let hoverRow = -1, hoverCol = -1, animatingStone = null;
  const ANIM_DURATION = 200;

  let canvas, ctx, turnTextEl, moveCountEl, mainClockEl;

  function formatTime(s) {
    const m = Math.floor(Math.max(0, s) / 60), sec = Math.floor(Math.max(0, s) % 60);
    return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
  }

  function showNotification(msg, dur = 3000) {
    const n = document.createElement('div'); n.className = 'notification'; n.textContent = msg;
    document.body.appendChild(n); setTimeout(() => { if (n.parentNode) n.remove(); }, dur);
  }

  function showModal(title, message, buttons = []) {
    const m = document.createElement('div');
    m.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:999;';
    let bHTML = buttons.map(b => `<button id="${b.id||''}" style="margin:4px;padding:8px 16px;border-radius:6px;border:1px solid #38bdf8;background:#1a1f2e;color:#38bdf8;cursor:pointer;font-weight:bold;">${b.text}</button>`).join('');
    m.innerHTML = `<div style="background:#1a1f2e;border:1px solid #38bdf8;border-radius:12px;padding:24px;text-align:center;max-width:360px;width:90%;"><h3 style="color:#e2e8f0;margin-bottom:10px;">${title}</h3><p style="color:#94a3b8;margin-bottom:12px;">${message}</p>${bHTML}</div>`;
    document.body.appendChild(m);
    buttons.forEach(b => { if (b.id && b.onClick) { const el = document.getElementById(b.id); if (el) el.addEventListener('click', () => { b.onClick(); m.remove(); }); } });
    return m;
  }

  function checkWin(row, col, player) {
    if (board[row][col] !== player) return null;
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      let cells = [[row, col]];
      for (let s = 1; s < 5; s++) { const r = row+dx*s, c = col+dy*s; if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player) cells.push([r,c]); else break; }
      for (let s = 1; s < 5; s++) { const r = row-dx*s, c = col-dy*s; if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player) cells.unshift([r,c]); else break; }
      if (cells.length >= 5) return cells;
    }
    return null;
  }

  function isBoardFull() {
    for (let r = 0; r < BOARD_SIZE; r++) for (let c = 0; c < BOARD_SIZE; c++) if (board[r][c] === EMPTY) return false;
    return true;
  }

  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } timerActive = false; }

  function startTimerIfNeeded() {
    if (timerActive || winner || isDraw || gameMode === MODE_ONLINE || (gameMode === MODE_AI && currentPlayer === aiColor)) return;
    timerActive = true;
    timerInterval = setInterval(() => {
      if (winner || isDraw) { stopTimer(); return; }
      if (currentPlayer === BLACK) { blackTime--; if (blackTime <= 0) { blackTime = 0; winner = WHITE; stopTimer(); updateUI(); drawBoard(); } }
      else { whiteTime--; if (whiteTime <= 0) { whiteTime = 0; winner = BLACK; stopTimer(); updateUI(); drawBoard(); } }
      updateClockDisplay();
    }, 1000);
  }

  function updateClockDisplay() {
    if (!mainClockEl) return;
    const t = currentPlayer === BLACK ? blackTime : whiteTime;
    mainClockEl.textContent = formatTime(t);
    mainClockEl.style.color = (currentPlayer === BLACK ? blackTime : whiteTime) <= 30 ? '#f87171' : '#38bdf8';
  }

  // Socket
  if (socket) {
    socket.on('connect', () => console.log('已连接'));
    socket.on('privateRoomCreated', ({ roomId }) => {
      currentRoomId = roomId; gameMode = MODE_ONLINE; updateModeButtons();
      navigator.clipboard.writeText(`${window.location.origin}/room/${roomId}`).then(() => showNotification('✅ 邀请链接已复制！')).catch(() => showNotification('📋 房间号: ' + roomId));
      document.getElementById('roomInfo').style.display = 'block'; document.getElementById('roomIdDisplay').textContent = roomId;
    });
    socket.on('joinedRoom', ({ roomId, color }) => {
      currentRoomId = roomId; myColor = color === BLACK_STR ? BLACK : WHITE; gameMode = MODE_ONLINE;
      updateModeButtons(); showNotification(`✅ 加入成功！执${color === BLACK_STR ? '⚫黑' : '⚪白'}`);
      document.getElementById('roomInfo').style.display = 'block'; document.getElementById('roomIdDisplay').textContent = roomId;
      updateUI();
    });
    socket.on('gameState', (gameState) => {
      const prevWinner = winner;
      board = gameState.board.map(row => row.map(cell => cell === BLACK_STR ? BLACK : cell === WHITE_STR ? WHITE : EMPTY));
      currentPlayer = gameState.currentPlayer === BLACK_STR ? BLACK : WHITE;
      winner = gameState.winner ? (gameState.winner === BLACK_STR ? BLACK : WHITE) : null;
      winningCells = gameState.winningCells || []; moveCount = gameState.moveCount; isDraw = gameState.isDraw;
      if (gameState.timers) { blackTime = gameState.timers.black; whiteTime = gameState.timers.white; }
      isMyTurn = (currentPlayer === myColor);
      updateUI(); drawBoard();
      if (myColor && (winner || isDraw) && !prevWinner && !gameState._statsUpdated) {
        gameState._statsUpdated = true;
        const token = localStorage.getItem('token');
        if (token) {
          let result = winner === myColor ? 'win' : (winner && winner !== myColor ? 'loss' : 'draw');
          if (result) fetch('/api/update-stats', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ result }) })
            .then(r => r.json()).then(data => {
              if (data.stats) {
                document.getElementById('usrRating').textContent = data.stats.rating;
                document.getElementById('usrW').textContent = data.stats.wins;
                document.getElementById('usrL').textContent = data.stats.losses;
                document.getElementById('usrD').textContent = data.stats.draws;
              }
            });
        }
      }
    });
    socket.on('undoRequest', () => showModal('悔棋请求', '对手请求悔棋', [
      { text: '同意', id: 'aUndo', onClick: () => socket.emit('acceptUndo', { roomId: currentRoomId }) },
      { text: '拒绝', id: 'rUndo', onClick: () => socket.emit('rejectUndo', { roomId: currentRoomId }) }
    ]));
    socket.on('undoRejected', () => showNotification('悔棋被拒绝'));
    socket.on('playerDisconnected', ({ message }) => { showNotification('⚠️ ' + message); if (myColor) { winner = myColor; updateUI(); drawBoard(); } });
    socket.on('error', ({ message }) => showNotification('⚠️ ' + message));
  }

  // AI
  function getNearbyEmptyCells(radius = 2) {
    const set = new Set();
    for (let r = 0; r < BOARD_SIZE; r++) for (let c = 0; c < BOARD_SIZE; c++) if (board[r][c] !== EMPTY)
      for (let dr = -radius; dr <= radius; dr++) for (let dc = -radius; dc <= radius; dc++) {
        const nr = r+dr, nc = c+dc;
        if (nr>=0&&nr<BOARD_SIZE&&nc>=0&&nc<BOARD_SIZE&&board[nr][nc]===EMPTY) set.add(`${nr},${nc}`);
      }
    return set.size ? Array.from(set).map(s => s.split(',').map(Number)) : [[7,7]];
  }

  function evaluatePosition(row, col, player) {
    let score = 0; board[row][col] = player;
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      let count = 1, openEnds = 0, r = row+dx, c = col+dy;
      while (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player) { count++; r+=dx; c+=dy; }
      if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY) openEnds++;
      r = row-dx; c = col-dy;
      while (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===player) { count++; r-=dx; c-=dy; }
      if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY) openEnds++;
      if (count >= 5) score += 100000;
      else if (count === 4) score += openEnds === 2 ? 10000 : openEnds === 1 ? 3000 : 0;
      else if (count === 3) score += openEnds === 2 ? 2000 : openEnds === 1 ? 800 : 0;
      else if (count === 2) score += openEnds === 2 ? 400 : openEnds === 1 ? 100 : 0;
      else if (count === 1) score += 10;
    }
    board[row][col] = EMPTY; return score;
  }

  function evaluateDefense(row, col, player) {
    const opp = player === BLACK ? WHITE : BLACK;
    let score = 0; board[row][col] = opp;
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      let count = 1, openEnds = 0, r = row+dx, c = col+dy;
      while (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===opp) { count++; r+=dx; c+=dy; }
      if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY) openEnds++;
      r = row-dx; c = col-dy;
      while (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===opp) { count++; r-=dx; c-=dy; }
      if (r>=0&&r<BOARD_SIZE&&c>=0&&c<BOARD_SIZE&&board[r][c]===EMPTY) openEnds++;
      if (count >= 5) score += 80000;
      else if (count === 4 && openEnds >= 1) score += 8000;
      else if (count === 3 && openEnds === 2) score += 1500;
    }
    board[row][col] = EMPTY; return score;
  }

  function aiMove() {
    if (winner || isDraw) { isAiThinking = false; updateUI(); return; }
    const candidates = getNearbyEmptyCells(2);
    let bestScore = -Infinity, bestMoves = [];
    for (let [r, c] of candidates) {
      let score = evaluatePosition(r, c, aiColor) * 1.2 + evaluateDefense(r, c, aiColor) * 1.1 + evaluatePosition(r, c, aiColor === BLACK ? WHITE : BLACK) * 0.3 + (14 - Math.abs(r-7) - Math.abs(c-7)) * 5;
      if (score > bestScore) { bestScore = score; bestMoves = [[r, c]]; }
      else if (score === bestScore) bestMoves.push([r, c]);
    }
    isAiThinking = false;
    if (bestMoves.length) placeStoneLocal(bestMoves[0][0], bestMoves[0][1]);
  }

  function resetGame() {
    if (gameMode === MODE_ONLINE && currentRoomId && socket) { socket.emit('leaveRoom', { roomId: currentRoomId }); currentRoomId = null; myColor = null; }
    stopTimer();
    board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
    currentPlayer = BLACK; winner = null; winningCells = []; historyStack = []; moveCount = 0; isDraw = false;
    blackTime = INITIAL_TIME; whiteTime = INITIAL_TIME; timerActive = false;
    hoverRow = -1; hoverCol = -1; isMyTurn = true; isAiThinking = false; animatingStone = null;
    document.getElementById('roomInfo').style.display = 'none';
    updateModeButtons(); updateUI(); drawBoard();
    if (gameMode === MODE_AI && aiColor === BLACK) setTimeout(() => aiMove(), 300);
  }

  function undoMove() {
    if (isAiThinking) return;
    if (gameMode === MODE_ONLINE && currentRoomId && socket) { socket.emit('requestUndo', { roomId: currentRoomId }); showNotification('已发送悔棋请求'); }
    else if (gameMode === MODE_AI && historyStack.length >= 2 && !winner && !isDraw) {
      for (let i = 0; i < 2; i++) { const last = historyStack.pop(); board = last.board.map(r => [...r]); currentPlayer = last.player; moveCount = last.moveCount; }
      updateUI(); drawBoard();
    } else if (gameMode === MODE_PVP && historyStack.length > 0 && !winner && !isDraw) {
      const last = historyStack.pop(); board = last.board.map(r => [...r]); currentPlayer = last.player; moveCount = last.moveCount;
      updateUI(); drawBoard();
    }
  }

  function placeStoneLocal(row, col) {
    if (board[row][col] !== EMPTY || winner || isDraw) return;
    historyStack.push({ board: board.map(r => [...r]), player: currentPlayer, moveCount });
    board[row][col] = currentPlayer; moveCount++;
    animatingStone = { row, col, startTime: performance.now() };
    const winResult = checkWin(row, col, currentPlayer);
    if (winResult) { winner = currentPlayer; winningCells = winResult; stopTimer(); updateUI(); drawBoard(); return; }
    if (isBoardFull()) { isDraw = true; stopTimer(); updateUI(); drawBoard(); return; }
    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
    startTimerIfNeeded(); updateUI(); drawBoard();
    if (gameMode === MODE_AI && currentPlayer === aiColor && !winner && !isDraw) setTimeout(() => aiMove(), 50);
  }

  function placeStone(row, col) {
    if (gameMode === MODE_ONLINE) { if (!isMyTurn || winner || isDraw || !currentRoomId || !socket) return; socket.emit('makeMove', { roomId: currentRoomId, row, col }); }
    else placeStoneLocal(row, col);
  }

  function createPrivateRoom() { if (!socket) return showNotification('未连接'); socket.emit('createPrivateRoom'); }
  function joinMatchmaking() { if (!socket) return showNotification('未连接'); socket.emit('joinMatchmaking', { color: playerColor === BLACK ? BLACK_STR : WHITE_STR }); }

  function updateUI() {
    if (!turnTextEl) return;
    let txt;
    if (winner) { txt = `🏆 ${winner === BLACK ? '黑方' : '白方'} 获胜！`; turnTextEl.style.color = '#fbbf24'; }
    else if (isDraw) { txt = '🤝 平局'; turnTextEl.style.color = '#94a3b8'; }
    else { txt = `${currentPlayer === BLACK ? '⚫ 黑方' : '⚪ 白方'} 回合${gameMode === MODE_ONLINE ? (isMyTurn ? ' (你)' : ' (对手)') : ''}`; turnTextEl.style.color = '#e2e8f0'; }
    turnTextEl.textContent = txt;
    if (moveCountEl) moveCountEl.textContent = `步数 ${moveCount}`;
    updateClockDisplay();
    document.getElementById('blackName').textContent = gameMode === MODE_ONLINE ? (myColor === BLACK ? '😎 你(黑)' : '对手(黑)') : '⚫ 黑方';
    document.getElementById('whiteName').textContent = gameMode === MODE_ONLINE ? (myColor === WHITE ? '😎 你(白)' : '对手(白)') : '⚪ 白方';
    document.getElementById('blackInfo').textContent = currentPlayer === BLACK && !winner && !isDraw ? '⏳ 思考中' : '';
    document.getElementById('whiteInfo').textContent = currentPlayer === WHITE && !winner && !isDraw ? '⏳ 思考中' : '';
  }

  function updateModeButtons() {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === gameMode));
    document.getElementById('onlineControls').style.display = gameMode === MODE_ONLINE ? 'flex' : 'none';
    document.getElementById('aiSettings').style.display = gameMode === MODE_AI ? 'flex' : 'none';
  }

  function drawBoard() {
    if (!ctx) return;
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    const grad = ctx.createLinearGradient(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    grad.addColorStop(0, '#2d2416'); grad.addColorStop(0.4, '#3b2e1e'); grad.addColorStop(0.8, '#4a3824'); grad.addColorStop(1, '#1f180c');
    ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(0, 0, CANVAS_SIZE, CANVAS_SIZE, 16); ctx.fill();
    ctx.save(); ctx.globalAlpha = 0.2; ctx.strokeStyle = '#6b5a3e'; ctx.lineWidth = 0.6;
    for (let i = 0; i < CANVAS_SIZE; i += 30) { ctx.beginPath(); ctx.moveTo(0, i+8); ctx.quadraticCurveTo(CANVAS_SIZE/2, i-4, CANVAS_SIZE, i+12); ctx.stroke(); }
    ctx.restore();
    ctx.strokeStyle = '#6b7a8f'; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.6;
    for (let i = 0; i < BOARD_SIZE; i++) {
      const pos = PADDING + i*CELL_SIZE;
      ctx.beginPath(); ctx.moveTo(PADDING, pos); ctx.lineTo(PADDING + (BOARD_SIZE-1)*CELL_SIZE, pos); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pos, PADDING); ctx.lineTo(pos, PADDING + (BOARD_SIZE-1)*CELL_SIZE); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    const starPoints = [[3,3],[3,11],[7,7],[11,3],[11,11]];
    for (let [r, c] of starPoints) {
      const x = PADDING + c*CELL_SIZE, y = PADDING + r*CELL_SIZE;
      ctx.fillStyle = '#e2e8f0'; ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fill();
    }
    let lastMoveRow = -1, lastMoveCol = -1;
    if (historyStack.length > 0) {
      const pb = historyStack[historyStack.length-1].board;
      for (let r = 0; r < BOARD_SIZE; r++) for (let c = 0; c < BOARD_SIZE; c++) if (board[r][c] !== EMPTY && pb[r][c] === EMPTY) { lastMoveRow = r; lastMoveCol = c; }
    }
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        const stone = board[r][c]; if (stone === EMPTY) continue;
        const x = PADDING + c*CELL_SIZE, y = PADDING + r*CELL_SIZE, radius = CELL_SIZE*0.43;
        const isWinStone = winningCells?.some(([wr, wc]) => wr===r && wc===c);
        const isLastMove = (r===lastMoveRow && c===lastMoveCol);
        let scale = 1;
        if (animatingStone?.row===r && animatingStone?.col===c) {
          const elapsed = performance.now() - animatingStone.startTime;
          if (elapsed < ANIM_DURATION) {
            const t = elapsed/ANIM_DURATION, c1=1.70158, c3=c1+1;
            scale = Math.max(0, Math.min(1, 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2)));
            requestAnimationFrame(drawBoard);
          } else animatingStone = null;
        }
        const dr = radius * scale;
        ctx.save(); ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=6; ctx.shadowOffsetX=1; ctx.shadowOffsetY=2;
        const g = ctx.createRadialGradient(x-dr*0.25, y-dr*0.3, dr*0.05, x, y, dr);
        if (stone===BLACK) { g.addColorStop(0,'#6b7280'); g.addColorStop(0.3,'#374151'); g.addColorStop(0.7,'#111827'); g.addColorStop(1,'#030712'); }
        else { g.addColorStop(0,'#fff'); g.addColorStop(0.3,'#f3f4f6'); g.addColorStop(0.7,'#d1d5db'); g.addColorStop(1,'#9ca3af'); }
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x, y, dr, 0, Math.PI*2); ctx.fill();
        ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
        ctx.fillStyle=stone===BLACK?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(x-dr*0.3, y-dr*0.35, dr*0.2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        if (isWinStone) {
          ctx.save(); ctx.shadowColor='#fbbf24'; ctx.shadowBlur=14; ctx.strokeStyle='#fcd34d'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(x, y, dr+2, 0, Math.PI*2); ctx.stroke();
          ctx.shadowBlur=0; ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.2;
          ctx.beginPath(); ctx.arc(x, y, dr+3, 0, Math.PI*2); ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
          ctx.restore();
        }
        if (isLastMove && !winner && !isDraw) {
          ctx.save(); ctx.fillStyle='#ef4444'; ctx.shadowColor='#ef4444'; ctx.shadowBlur=5;
          ctx.beginPath(); ctx.arc(x, y, dr*0.2, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
      }
    }
    const canPlace = gameMode !== MODE_ONLINE || isMyTurn;
    if (!winner && !isDraw && !isAiThinking && canPlace && hoverRow>=0 && hoverCol>=0 && board[hoverRow][hoverCol]===EMPTY) {
      const x = PADDING+hoverCol*CELL_SIZE, y = PADDING+hoverRow*CELL_SIZE, r = CELL_SIZE*0.43;
      ctx.globalAlpha=0.4;
      const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
      if (currentPlayer===BLACK) { g.addColorStop(0,'#4b5563'); g.addColorStop(0.8,'#111827'); }
      else { g.addColorStop(0,'#fff'); g.addColorStop(0.8,'#cbd5e1'); }
      ctx.fillStyle=g; ctx.shadowColor='#000'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
    }
  }

  function getBoardRowCol(cx, cy) {
    const rect = canvas.getBoundingClientRect(), sx = CANVAS_SIZE/rect.width, sy = CANVAS_SIZE/rect.height;
    const canX = (cx-rect.left)*sx, canY = (cy-rect.top)*sy;
    const col = Math.round((canX-PADDING)/CELL_SIZE), row = Math.round((canY-PADDING)/CELL_SIZE);
    return (row>=0&&row<BOARD_SIZE&&col>=0&&col<BOARD_SIZE) ? { row, col } : null;
  }

  function setupEvents() {
    if (!canvas) return;
    canvas.addEventListener('click', (e) => {
      if (isAiThinking) return;
      if (gameMode===MODE_ONLINE && !isMyTurn) return;
      if (gameMode===MODE_AI && currentPlayer!==playerColor) return;
      const pos = getBoardRowCol(e.clientX, e.clientY); if (pos) placeStone(pos.row, pos.col);
    });
    canvas.addEventListener('mousemove', (e) => {
      const pos = getBoardRowCol(e.clientX, e.clientY);
      const can = gameMode===MODE_PVP || (gameMode===MODE_AI&&currentPlayer===playerColor&&!isAiThinking) || (gameMode===MODE_ONLINE&&isMyTurn);
      if (pos && board[pos.row][pos.col]===EMPTY && !winner && !isDraw && can) {
        if (hoverRow!==pos.row||hoverCol!==pos.col) { hoverRow=pos.row; hoverCol=pos.col; drawBoard(); }
      } else { if (hoverRow!==-1||hoverCol!==-1) { hoverRow=-1; hoverCol=-1; drawBoard(); } }
    });
    canvas.addEventListener('mouseleave', () => { if (hoverRow!==-1||hoverCol!==-1) { hoverRow=-1; hoverCol=-1; drawBoard(); } });
  }

  function switchMode(mode) {
    if (mode === gameMode) return;
    if (gameMode===MODE_ONLINE && currentRoomId && socket) socket.emit('leaveRoom', { roomId: currentRoomId });
    stopTimer(); currentRoomId=null; myColor=null; isMyTurn=true; gameMode=mode; isAiThinking=false;
    playerColor=BLACK; aiColor=WHITE;
    board=Array(BOARD_SIZE).fill().map(()=>Array(BOARD_SIZE).fill(EMPTY));
    currentPlayer=BLACK; winner=null; winningCells=[]; historyStack=[]; moveCount=0; isDraw=false;
    blackTime=INITIAL_TIME; whiteTime=INITIAL_TIME; timerActive=false; hoverRow=-1; hoverCol=-1; animatingStone=null;
    document.getElementById('roomInfo').style.display='none';
    document.querySelectorAll('.color-dot').forEach(o=>o.classList.toggle('sel', parseInt(o.dataset.color)===BLACK));
    updateModeButtons(); updateUI(); drawBoard();
    if (gameMode===MODE_AI && aiColor===BLACK) setTimeout(()=>aiMove(), 300);
  }

  function setPlayerColor(color) {
    if (color===playerColor||isAiThinking) return;
    playerColor=color; aiColor=color===BLACK?WHITE:BLACK;
    document.querySelectorAll('.color-dot').forEach(o=>o.classList.toggle('sel', parseInt(o.dataset.color)===color));
    board=Array(BOARD_SIZE).fill().map(()=>Array(BOARD_SIZE).fill(EMPTY));
    currentPlayer=BLACK; winner=null; winningCells=[]; historyStack=[]; moveCount=0; isDraw=false;
    blackTime=INITIAL_TIME; whiteTime=INITIAL_TIME; stopTimer(); hoverRow=-1; hoverCol=-1; isAiThinking=false; animatingStone=null;
    updateUI(); drawBoard();
    if (aiColor===BLACK) setTimeout(()=>aiMove(), 300);
  }

  // 初始化
  canvas = document.getElementById('boardCanvas');
  canvas.width = CANVAS_SIZE; canvas.height = CANVAS_SIZE;
  ctx = canvas.getContext('2d');
  turnTextEl = document.getElementById('turnText');
  moveCountEl = document.getElementById('moveCount');
  mainClockEl = document.getElementById('mainClock');

  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;
  };

  document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>switchMode(b.dataset.mode)));
  document.querySelectorAll('.color-dot').forEach(o=>o.addEventListener('click',()=>setPlayerColor(parseInt(o.dataset.color))));
  document.getElementById('createRoomBtn').addEventListener('click', createPrivateRoom);
  document.getElementById('matchmakingBtn').addEventListener('click', ()=>{ joinMatchmaking(); document.getElementById('matchmakingBtn').style.display='none'; });
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('undoBtn').addEventListener('click', undoMove);

  const pathRoomId = window.location.pathname.split('/room/')[1];
  if (pathRoomId && socket) { gameMode=MODE_ONLINE; updateModeButtons(); socket.emit('joinPrivateRoom',{roomId:pathRoomId}); }

  setupEvents(); updateUI(); drawBoard();
  console.log('🎮 五子棋已启动');
});
</script>
</body>
